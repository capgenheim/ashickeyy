name: ashickey
description: ashickey blog - Flutter Web frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^14.2.0

  # State management
  provider: ^6.1.0

  # HTTP
  dio: ^5.5.0

  # Markdown rendering
  flutter_markdown: ^0.7.3

  # Sharing
  share_plus: ^10.1.3

  # Animations
  flutter_animate: ^4.5.0

  # Typography
  google_fonts: ^6.2.0

  # Image caching
  cached_network_image: ^3.4.0

  # Theme persistence
  shared_preferences: ^2.3.0

  # URL strategy (remove hash from URLs)
  url_strategy: ^0.3.0

  # Shimmer loading effect
  shimmer: ^3.0.0

  # URL launcher (for markdown links)
  url_launcher: ^6.3.0

  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/acap.png
    - assets/images/ashickey_light.webp
    - assets/images/ashickey_dark.webp

<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ashickey{} - Tech, Development & Current Issues Blog">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Preconnect to API -->
  <link rel="preconnect" href="/" crossorigin>
  <link rel="dns-prefetch" href="/">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="favicon.webp"/>

  <title>ashickey{}</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0F1117;
    }
    .loading {
      display: none;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #007AFF;
      font-size: 24px;
      font-weight: 600;
    }
  </style>
  <style>
    body, html {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableDevTools(event)">
  <div class="loading" id="loading">ashickey{}</div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function disableDevTools(e) {
      if(e.keyCode == 123) {
        return false;
      }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
        return false;
      }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
        return false;
      }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
        return false;
      }
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
        return false;
      }
    }

    async function registerWebPush(publicVapidKey, apiUrl) {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      try {
        const reg = await navigator.serviceWorker.register('sw.js');
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: publicVapidKey
        });
        
        await fetch(apiUrl, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(sub)
        });
      } catch (e) {
        console.error('Web Push registration failed:', e);
      }
    }
  </script>
</body>
</html>
